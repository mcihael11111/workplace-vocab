name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "packages/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/backend/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Health check (import only — no DB required)
        run: node --input-type=module <<< "import './src/config/env.js'; console.log('Config OK');"
        env:
          NODE_ENV: test
